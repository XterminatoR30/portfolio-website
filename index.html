  <!-- Security Protection Script -->
  <script>
    (function() {
      'use strict';
      
      // Console warning message
      const warningStyle = 'color: red; font-size: 24px; font-weight: bold; text-shadow: 2px 2px 4px black;';
      const messageStyle = 'color: orange; font-size: 16px;';
      console.log('%c⚠️ WARNING! ⚠️', warningStyle);
      console.log('%cThis is a browser feature intended for developers.', messageStyle);
      console.log('%cIf someone told you to copy-paste something here, it is likely a scam.', messageStyle);
      console.log('%c© Kevin Cliff Gunawan - All Rights Reserved', messageStyle);
      
      // Disable right-click
      document.addEventListener('contextmenu', function(e) {
        e.preventDefault();
        return false;
      }, false);
      
      // Disable specific keyboard shortcuts
      document.addEventListener('keydown', function(e) {
        // F12 - Developer Tools
        if (e.keyCode === 123) {
          e.preventDefault();
          return false;
        }
        // Ctrl+Shift+I - Developer Tools
        if (e.ctrlKey && e.shiftKey && e.keyCode === 73) {
          e.preventDefault();
          return false;
        }
        // Ctrl+Shift+J - Console
        if (e.ctrlKey && e.shiftKey && e.keyCode === 74) {
          e.preventDefault();
          return false;
        }
        // Ctrl+U - View Source
        if (e.ctrlKey && e.keyCode === 85) {
          e.preventDefault();
          return false;
        }
        // Ctrl+Shift+C - Inspect Element
        if (e.ctrlKey && e.shiftKey && e.keyCode === 67) {
          e.preventDefault();
          return false;
        }
        // Ctrl+S - Save Page
        if (e.ctrlKey && e.keyCode === 83) {
          e.preventDefault();
          return false;
        }
        // Ctrl+A - Select All (optional, uncomment if needed)
        // if (e.ctrlKey && e.keyCode === 65) {
        //   e.preventDefault();
        //   return false;
        // }
      }, false);
      
      // Detect DevTools
      let devtoolsOpen = false;
      const threshold = 160;
      
      const detectDevTools = () => {
        const widthThreshold = window.outerWidth - window.innerWidth > threshold;
        const heightThreshold = window.outerHeight - window.innerHeight > threshold;
        
        if (widthThreshold || heightThreshold) {
          if (!devtoolsOpen) {
            devtoolsOpen = true;
            console.clear();
            console.log('%c⛔ STOP! ⛔', 'color: red; font-size: 50px; font-weight: bold;');
            console.log('%cUnauthorized access to source code is prohibited.', 'color: red; font-size: 20px;');
          }
        } else {
          devtoolsOpen = false;
        }
      };
      
      // Check periodically
      setInterval(detectDevTools, 500);
      
      // Disable text selection
      document.onselectstart = function() {
        return false;
      };
      
      // Disable copy
      document.addEventListener('copy', function(e) {
        e.preventDefault();
        return false;
      }, false);
      
      // Disable cut
      document.addEventListener('cut', function(e) {
        e.preventDefault();
        return false;
      }, false);
      
      // Disable drag
      document.addEventListener('dragstart', function(e) {
        e.preventDefault();
        return false;
      }, false);
      
      // Clear console periodically to remove any debug information
      setInterval(function() {
        if (!devtoolsOpen) {
          console.clear();
        }
      }, 3000);
      
      // Additional protection: Disable printing
      window.addEventListener('beforeprint', function(e) {
        e.preventDefault();
        alert('Printing is disabled for this page.');
        return false;
      });
      
      // Prevent iframe embedding
      if (window.top !== window.self) {
        window.top.location = window.self.location;
      }
      
    })();
